<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthProCEO Diagrams</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }

    /* Index page */
    .index-container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    .index-container h1 { font-size: 2rem; margin-bottom: 8px; color: #fff; }
    .index-container p { color: #888; margin-bottom: 32px; }
    .diagram-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .diagram-card {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
      padding: 20px; cursor: pointer; transition: all 0.2s;
      text-decoration: none; color: inherit; display: block;
    }
    .diagram-card:hover { border-color: #4a9eed; background: #1e1e2e; transform: translateY(-2px); }
    .diagram-card h3 { font-size: 1rem; color: #fff; margin-bottom: 6px; }
    .diagram-card span { font-size: 0.8rem; color: #666; }

    /* Viewer page */
    html, body, #root { height: 100%; }
    .viewer-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .viewer-header {
      display: flex; align-items: center; gap: 12px; padding: 8px 20px;
      background: #1a1a1a; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; z-index: 10;
    }
    .viewer-header a { color: #4a9eed; text-decoration: none; font-size: 0.9rem; }
    .viewer-header h2 { font-size: 1rem; color: #fff; }
    .viewer-canvas { flex: 1; position: relative; width: 100%; min-height: 0; }
    .viewer-canvas .excalidraw { width: 100% !important; height: 100% !important; }
    .viewer-canvas .excalidraw .excalidraw-container { width: 100% !important; height: 100% !important; }
    .loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #888; }
    .error { color: #ef4444; text-align: center; padding: 40px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
